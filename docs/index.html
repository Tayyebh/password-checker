<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Checker Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .toggle-password {
            margin-top: 8px;
        }

        .toggle-password input[type="checkbox"] {
            margin-right: 5px;
        }

        .toggle-password label {
            display: inline;
            font-weight: 400;
            margin: 0;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            font-weight: 600;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result.empty {
            display: none;
        }

        .result.valid {
            background-color: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }

        .result.invalid {
            background-color: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .requirements {
            margin-top: 30px;
            padding: 20px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }

        .requirements h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .requirement {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: #666;
        }

        .requirement.met {
            color: #28a745;
        }

        .requirement.unmet {
            color: #dc3545;
        }

        .requirement-icon {
            margin-right: 10px;
            font-size: 16px;
            min-width: 20px;
        }

        .examples {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .examples h4 {
            color: #333;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .example-list {
            font-size: 12px;
            color: #666;
        }

        .example-list li {
            margin-bottom: 5px;
            margin-left: 20px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #999;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Password Checker</h1>
        <p class="subtitle">Real-time password validation</p>

        <div class="input-group">
            <label for="password">Enter Password:</label>
            <input type="password" id="password" placeholder="Enter your password" oninput="checkPassword()">
            <div class="toggle-password">
                <input type="checkbox" id="togglePassword" onchange="togglePasswordVisibility()">
                <label for="togglePassword">Show password</label>
            </div>
        </div>

        <div id="result" class="result empty"></div>

        <div class="requirements">
            <h3>📋 Requirements</h3>
            <div class="requirement unmet" id="req-length">
                <span class="requirement-icon">✗</span>
                <span>8-20 characters</span>
            </div>
            <div class="requirement unmet" id="req-uppercase">
                <span class="requirement-icon">✗</span>
                <span>At least one uppercase letter (A-Z)</span>
            </div>
            <div class="requirement unmet" id="req-special">
                <span class="requirement-icon">✗</span>
                <span>At least one special character (!@#$%^&*)</span>
            </div>

            <div class="examples">
                <h4>✅ Valid Examples:</h4>
                <ul class="example-list">
                    <li>Secure@123</li>
                    <li>MyPass!99</li>
                    <li>P@ssw0rd</li>
                    <li>Demo$Pass2</li>
                </ul>
            </div>
        </div>

        <div class="footer">
            <p>🔗 <a href="https://github.com/Tayyebh/password-checker" target="_blank">View on GitHub</a></p>
        </div>
    </div>

    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleCheckbox = document.getElementById('togglePassword');
            passwordInput.type = toggleCheckbox.checked ? 'text' : 'password';
        }

        function checkPassword() {
            const password = document.getElementById('password').value;
            const result = document.getElementById('result');

            // Check requirements
            const lengthValid = password.length >= 8 && password.length <= 20;
            const uppercaseValid = /[A-Z]/.test(password);
            const specialValid = /[^a-zA-Z0-9]/.test(password);

            // Update requirement indicators
            updateRequirement('req-length', lengthValid);
            updateRequirement('req-uppercase', uppercaseValid);
            updateRequirement('req-special', specialValid);

            // Check if all requirements are met
            const allValid = lengthValid && uppercaseValid && specialValid;

            // Update result message
            if (password === '') {
                result.textContent = '';
                result.className = 'result empty';
            } else if (allValid) {
                result.textContent = '✅ Password is valid!';
                result.className = 'result valid';
            } else {
                let errorMessages = [];
                if (!lengthValid) {
                    errorMessages.push(password.length < 8 ? 'too short' : 'too long');
                }
                if (!uppercaseValid) {
                    errorMessages.push('needs uppercase');
                }
                if (!specialValid) {
                    errorMessages.push('needs special character');
                }
                result.textContent = '❌ ' + errorMessages.join(', ');
                result.className = 'result invalid';
            }
        }

        function updateRequirement(id, isMet) {
            const element = document.getElementById(id);
            if (isMet) {
                element.className = 'requirement met';
                element.querySelector('.requirement-icon').textContent = '✓';
            } else {
                element.className = 'requirement unmet';
                element.querySelector('.requirement-icon').textContent = '✗';
            }
        }
    </script>
</body>
</html>
